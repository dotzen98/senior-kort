<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log ind – Seniorklubber i København</title>
  <link rel="stylesheet" href="css/login.css" />
</head>
<body>

  <div class="login-card">
    <h1>Seniorklubber i København</h1>
    <p class="login-subtitle">Log ind for at fortsætte</p>

    <form id="login-form" autocomplete="on">
      <label class="login-label">
        Brugernavn
        <input type="text" id="username" name="username" autocomplete="username" autofocus />
      </label>
      <label class="login-label">
        Adgangskode
        <input type="password" id="password" name="password" autocomplete="current-password" />
      </label>
      <p id="login-error" class="login-error hidden">Forkert brugernavn eller adgangskode.</p>
      <button type="submit" id="login-btn" class="btn btn-primary login-submit">Log ind</button>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase-config.js"></script>
  <script>
    var SESSION_KEY = 'auth';

    // If already logged in, skip straight to the app
    (function () {
      if (sessionStorage.getItem(SESSION_KEY)) {
        window.location.replace('index.html');
      }
    })();

    document.getElementById('login-form').addEventListener('submit', async function (e) {
      e.preventDefault();
      var btn     = document.getElementById('login-btn');
      var errorEl = document.getElementById('login-error');
      var username = document.getElementById('username').value.trim();
      var password = document.getElementById('password').value;

      errorEl.classList.add('hidden');
      errorEl.textContent = 'Forkert brugernavn eller adgangskode.';
      btn.disabled = true;
      btn.textContent = 'Logger ind…';

      try {
        var result = await sb.rpc('verify_user', { p_username: username, p_password: password });
        if (result.error) throw result.error;

        if (result.data) {
          sessionStorage.setItem(SESSION_KEY, JSON.stringify({ loggedIn: true, username: result.data }));
          window.location.replace('index.html');
        } else {
          errorEl.classList.remove('hidden');
          btn.disabled = false;
          btn.textContent = 'Log ind';
          document.getElementById('password').value = '';
          document.getElementById('password').focus();
        }
      } catch (err) {
        errorEl.textContent = 'Teknisk fejl – prøv igen.';
        errorEl.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'Log ind';
      }
    });
  </script>
</body>
</html>
