<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log ind – Seniorklubber i København</title>
  <link rel="stylesheet" href="css/login.css" />
</head>
<body>

  <div class="login-card">
    <h1>Seniorklubber i København</h1>
    <p class="login-subtitle">Log ind for at fortsætte</p>

    <form id="login-form" autocomplete="on">
      <label class="login-label">
        Brugernavn
        <input type="text" id="username" name="username" autocomplete="username" autofocus />
      </label>
      <label class="login-label">
        Adgangskode
        <input type="password" id="password" name="password" autocomplete="current-password" />
      </label>
      <p id="login-error" class="login-error hidden">Forkert brugernavn eller adgangskode.</p>
      <button type="submit" id="login-btn" class="btn btn-primary login-submit">Log ind</button>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase-config.js"></script>
  <script>
    (async function () {
      const { data: { session } } = await sb.auth.getSession();
      if (session) window.location.replace('index.html');
    })();

    document.getElementById('login-form').addEventListener('submit', async function (e) {
      e.preventDefault();
      const btn     = document.getElementById('login-btn');
      const errorEl = document.getElementById('login-error');
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const email    = username + '@admin.local';

      errorEl.classList.add('hidden');
      btn.disabled = true;
      btn.textContent = 'Logger ind…';

      const { error } = await sb.auth.signInWithPassword({ email, password });

      if (error) {
        errorEl.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'Log ind';
        document.getElementById('password').value = '';
        document.getElementById('username').focus();
      } else {
        window.location.replace('index.html');
      }
    });
  </script>
</body>
</html>
